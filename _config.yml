title: Akshay Raj Dhamija
description: Computer Vision and Deep Learning Researcher
baseurl: "" # Empty for GitHub Pages user site
url: "" # Your site URL (leave empty for local dev)

markdown: kramdown
kramdown:
  math_engine: mathjax
  math_engine_opts:
    preview: AsciiMath
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
plugins:
  - jekyll-relative-links
include:
  - blog
exclude:
  - README.md
  - README.txt
  - LICENSE.txt
  - vendor
  - Gemfile
  - Gemfile.lock
  - setup_jekyll.sh
  - README_JEKYLL.md
