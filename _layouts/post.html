<!DOCTYPE HTML>
<html>
	<head>
		<title>{% if page.title %}{{ page.title }} - {% endif %}Blog - Akshay Raj Dhamija</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="../assets/css/main.css" />
		<!-- Syntax highlighting CSS - using monokai for better contrast -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai.min.css">
		<style>
			/* Custom styles for markdown content */
			#markdown-content {
				line-height: 1.8;
			}
			#markdown-content h1 {
				margin-top: 1em;
				margin-bottom: 0.5em;
			}
			#markdown-content h2 {
				margin-top: 1.5em;
				margin-bottom: 0.5em;
				border-bottom: 2px solid #f4f4f4;
				padding-bottom: 0.3em;
			}
			#markdown-content h3 {
				margin-top: 1.2em;
				margin-bottom: 0.5em;
			}
		#markdown-content pre {
			background: #272822;
			padding: 1em;
			border-radius: 5px;
			overflow-x: auto;
			margin: 1.5em 0;
		}
		#markdown-content code {
			background: #f5f5f5;
			padding: 0.2em 0.4em;
			border-radius: 3px;
			font-family: 'Source Code Pro', monospace;
			font-size: 0.9em;
			color: #c7254e;
		}
		#markdown-content pre code {
			background: transparent;
			padding: 0;
			color: #f8f8f2;
			font-size: 0.95em;
		}
		#markdown-content blockquote {
			border-left: 4px solid #4acaa8;
			padding-left: 1em;
			margin-left: 0;
			font-style: italic;
			color: #666;
		}
		#markdown-content img {
			max-width: 100%;
			height: auto;
			margin: 1.5em 0;
			border-radius: 5px;
		}
		#markdown-content ul, #markdown-content ol {
			margin: 1em 0;
			padding-left: 2em;
		}
		#markdown-content li {
			margin: 0.5em 0;
			list-style-type: disc;
		}
		#markdown-content ol li {
			list-style-type: decimal;
		}
		#markdown-content hr {
			border: none;
			border-top: 2px solid #f4f4f4;
			margin: 2em 0;
		}
		#markdown-content table {
			border-collapse: collapse;
			width: 100%;
			margin: 1.5em 0;
		}
		#markdown-content th, #markdown-content td {
			border: 1px solid #ddd;
			padding: 0.75em;
			text-align: left;
		}
		#markdown-content th {
			background-color: #4acaa8;
			color: white;
		}
		</style>
	</head>
	<body class="is-preload">

		<!-- Header -->
			<section id="header">
				<footer>
					<span class="image avatar"><img src="../Images/ARD.png" alt="" width="300" height="200"/></span>
					<h1 id="logo"><a href="../index.html">Akshay Raj Dhamija</a></h1>
					<p>Computer Vision and Deep Learning Researcher</p>
					<header>
					<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
					<ul class="icons">
						<li><a href="https://github.com/akshay-raj-dhamija" class="icon brands fa-github"><span class="label">Github</span></a></li>
						<li><a href="https://www.linkedin.com/in/akshay-raj-dhamija/" class="icon brands fa-linkedin-in"><span class="label">LinkedIn</span></a></li>
						<li><a href="https://scholar.google.com/citations?user=7tCAuwIAAAAJ&hl=en&oi=ao" class="icon solid fa-user-graduate"><span class="label">Google Scholar</span></a></li>
						<li><a href="../CV_Akshay_Raj_Dhamija.pdf" class="icon solid fa-file-pdf"><span class="label">Resume</span></a></li>
						<li><a href="../vr.html" class="icon solid fa-vr-cardboard"><span class="label">VR Website</span></a></li>
						<li><a href="https://twitter.com/AkshayRDhamija" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
						<li><a href="index.html" class="icon solid fa-blog"><span class="label">Blog</span></a></li>
					</ul>
					</header>
				</footer>
				<nav id="nav">
					<ul>
						<li><a href="../index.html#one">About Me</a></li>
						<li><a href="../index.html#three">Publications</a></li>
						<li><a href="../index.html#four">Work Experience</a></li>
						<li><a href="../index.html#five">Project Portfolio</a></li>
						<li><a href="../index.html#two">Education</a></li>
						<li><a href="../index.html#six">A Few Accomplishments</a></li>
						<li><a href="index.html" class="active">Blog</a></li>
					</ul>
				</nav>
			</section>

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Main -->
					<div id="main">

						<!-- Article -->
							<section id="article">
								<div class="container">
									<div id="markdown-content">
										{{ content }}
									</div>
								</div>
							</section>

					</div>
			</div>

		<!-- Scripts -->
			<script src="../assets/js/jquery.min.js"></script>
			<script src="../assets/js/jquery.scrollex.min.js"></script>
			<script src="../assets/js/jquery.scrolly.min.js"></script>
			<script src="../assets/js/browser.min.js"></script>
			<script src="../assets/js/breakpoints.min.js"></script>
			<script src="../assets/js/util.js"></script>
			<script src="../assets/js/main.js"></script>
			
		<!-- Syntax Highlighting -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
		<script>
			document.addEventListener('DOMContentLoaded', function() {
				document.querySelectorAll('pre code').forEach((block) => {
					hljs.highlightElement(block);
				});
			});
		</script>
		
		<!-- MathJax for LaTeX rendering -->
		<script>
			MathJax = {
				tex: {
					inlineMath: [['$', '$'], ['\\(', '\\)']],
					displayMath: [['$$', '$$'], ['\\[', '\\]']],
					processEscapes: true
				},
				options: {
					skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
				}
			};
		</script>
		<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
		<script>
			// Ensure MathJax processes the page after it loads
			window.addEventListener('load', function() {
				if (window.MathJax && window.MathJax.typesetPromise) {
					MathJax.typesetPromise().catch(function (err) {
						console.error('MathJax rendering error:', err);
					});
				}
			});
		</script>

	</body>
</html>
